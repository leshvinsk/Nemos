{% extends "core/base.html" %}
{% load static %}

{% block content %}
  <section class="mx-auto flex min-h-[82vh] w-full max-w-5xl items-center justify-center">
    <div class="w-full max-w-2xl rounded-3xl border border-slate-200/70 bg-white/75 p-8 shadow-soft backdrop-blur-xl sm:p-12">
      <div class="flex items-center gap-4">
        <span class="inline-flex h-14 w-14 items-center justify-center overflow-hidden rounded-2xl bg-white shadow-soft ring-1 ring-slate-200/70">
          <img src="{% static 'core/logo-v2.png' %}" alt="NEMOS logo" class="h-12 w-12 object-contain" />
        </span>
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">NEMOS</p>
          <h1 class="mt-1 text-4xl font-semibold tracking-tight text-slate-900 sm:text-5xl">Sign in</h1>
        </div>
      </div>

      <p class="mt-5 text-base text-slate-600">
        Sign in to continue to NEMOS.
      </p>

      <form method="post" class="mt-8 space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-slate-700">Username</label>
          <input
            name="username"
            autocomplete="username"
            required
            class="mt-1 w-full rounded-2xl border border-slate-200 bg-white/90 px-5 py-4 text-base shadow-sm outline-none ring-slate-200 focus:border-ink-950 focus:ring-2"
            placeholder="Enter your username"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700">Password</label>
          <div class="relative mt-1">
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="w-full rounded-2xl border border-slate-200 bg-white/90 px-5 py-4 pr-14 text-base shadow-sm outline-none ring-slate-200 focus:border-ink-950 focus:ring-2"
              placeholder="Enter your password"
            />
            <button
              type="button"
              id="toggle-password"
              aria-label="Press and hold to show password"
              aria-pressed="false"
              class="absolute inset-y-0 right-4 inline-flex items-center text-slate-500 transition hover:text-slate-700 focus:outline-none"
            >
              <svg id="icon-eye-ms" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-5 w-5" aria-hidden="true">
                <path d="M4 12c1.8-3.1 4.5-4.8 8-4.8s6.2 1.7 8 4.8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <circle cx="12" cy="14.2" r="3.2" stroke="currentColor" stroke-width="2.2" />
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-2xl bg-ink-950 px-5 py-4 text-base font-semibold text-white shadow-soft transition hover:opacity-95"
        >
          Login
        </button>

        <p class="text-sm text-slate-500">
          After signing in, you'll land on the activities page.
        </p>
      </form>
    </div>
  </section>
  <script>
    (function () {
      const input = document.getElementById("login-password");
      const toggle = document.getElementById("toggle-password");
      if (!input || !toggle) return;

      const showPassword = () => {
        input.type = "text";
        toggle.setAttribute("aria-pressed", "true");
      };

      const hidePassword = () => {
        input.type = "password";
        toggle.setAttribute("aria-pressed", "false");
      };

      toggle.addEventListener("mousedown", (event) => {
        event.preventDefault();
        showPassword();
      });
      toggle.addEventListener("mouseup", hidePassword);
      toggle.addEventListener("mouseleave", hidePassword);
      toggle.addEventListener("touchstart", showPassword, { passive: true });
      toggle.addEventListener("touchend", hidePassword);
      toggle.addEventListener("touchcancel", hidePassword);
      toggle.addEventListener("blur", hidePassword);
      toggle.addEventListener("keydown", (event) => {
        if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          showPassword();
        }
      });
      toggle.addEventListener("keyup", (event) => {
        if (event.key === " " || event.key === "Enter") hidePassword();
      });
    })();
  </script>
{% endblock %}
