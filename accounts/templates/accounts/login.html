{% extends "core/base.html" %}
{% load static %}

{% block content %}
  <section id="login-stage" class="fixed inset-0 flex min-h-screen w-screen items-center justify-center overflow-hidden">
    <div id="login-bg-base" class="absolute inset-0 bg-[linear-gradient(135deg,#f8fbff_0%,#eef4ff_34%,#e3ecff_68%,#dbe8ff_100%)]"></div>
    <div id="login-grid" class="pointer-events-none absolute inset-0 opacity-40 [background-image:linear-gradient(rgba(148,163,184,0.14)_1px,transparent_1px),linear-gradient(90deg,rgba(148,163,184,0.14)_1px,transparent_1px)] [background-size:72px_72px] transition-transform duration-300 ease-out"></div>
    <div id="login-layer-back" class="pointer-events-none absolute -inset-[12%] transition-transform duration-300 ease-out">
      <div class="absolute left-[2%] top-[6%] h-80 w-80 rounded-full bg-sky-200/55 blur-3xl"></div>
      <div class="absolute right-[4%] top-[10%] h-96 w-96 rounded-full bg-indigo-200/55 blur-3xl"></div>
      <div class="absolute left-[18%] bottom-[4%] h-96 w-96 rounded-full bg-cyan-100/55 blur-3xl"></div>
    </div>
    <div id="login-layer-mid" class="pointer-events-none absolute inset-0 transition-transform duration-300 ease-out">
      <div class="absolute left-[8%] top-[16%] h-40 w-72 rotate-[-8deg] rounded-[2rem] border border-white/60 bg-white/30 shadow-soft backdrop-blur-sm"></div>
      <div class="absolute right-[10%] top-[22%] h-48 w-64 rotate-[10deg] rounded-[2rem] border border-white/60 bg-white/25 shadow-soft backdrop-blur-sm"></div>
      <div class="absolute left-[12%] bottom-[14%] h-44 w-64 rotate-[8deg] rounded-[2rem] border border-white/60 bg-white/25 shadow-soft backdrop-blur-sm"></div>
      <div class="absolute right-[16%] bottom-[10%] h-36 w-72 rotate-[-6deg] rounded-[2rem] border border-white/60 bg-white/30 shadow-soft backdrop-blur-sm"></div>
    </div>
    <div id="login-layer-front" class="pointer-events-none absolute inset-0 transition-transform duration-200 ease-out">
      <div class="absolute left-[6%] top-[12%] h-3 w-3 rounded-full bg-slate-300/80"></div>
      <div class="absolute left-[24%] top-[8%] h-5 w-5 rounded-full bg-white/90"></div>
      <div class="absolute right-[18%] top-[14%] h-4 w-4 rounded-full bg-slate-300/80"></div>
      <div class="absolute right-[8%] top-[36%] h-3 w-3 rounded-full bg-white/90"></div>
      <div class="absolute left-[10%] bottom-[18%] h-4 w-4 rounded-full bg-white/90"></div>
      <div class="absolute right-[24%] bottom-[12%] h-5 w-5 rounded-full bg-slate-300/80"></div>
    </div>
    <div id="login-glow" class="pointer-events-none absolute inset-0 opacity-90 transition-[background] duration-200 ease-out"></div>

    <div class="relative mx-4 w-full max-w-2xl rounded-3xl border border-slate-200/70 bg-white/75 p-6 shadow-soft backdrop-blur-xl sm:p-12">
      <div class="flex items-center gap-3 sm:gap-4">
        <span class="inline-flex h-12 w-12 items-center justify-center overflow-hidden rounded-2xl bg-white shadow-soft ring-1 ring-slate-200/70 sm:h-14 sm:w-14">
          <img src="{% static 'core/logo-v2.png' %}" alt="NEMOS logo" class="h-10 w-10 object-contain sm:h-12 sm:w-12" />
        </span>
        <div>
          <h1 class="text-3xl font-semibold uppercase tracking-[0.08em] text-slate-900 sm:text-5xl">NEMOS</h1>
        </div>
      </div>

      <p class="mt-4 text-base text-slate-600 sm:mt-5">
        Sign in to continue to NEMOS
      </p>

      <form method="post" class="mt-6 space-y-5 sm:mt-8">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next|default:'' }}" />

        <div>
          <label class="block text-sm font-medium text-slate-700">Username</label>
          <input
            name="username"
            autocomplete="username"
            required
            class="mt-1 w-full rounded-2xl border border-slate-200 bg-white/90 px-5 py-4 text-base shadow-sm outline-none ring-slate-200 focus:border-ink-950 focus:ring-2"
            placeholder="Enter your username"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700">Password</label>
          <div class="relative mt-1">
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="w-full rounded-2xl border border-slate-200 bg-white/90 px-5 py-4 pr-14 text-base shadow-sm outline-none ring-slate-200 focus:border-ink-950 focus:ring-2"
              placeholder="Enter your password"
            />
            <button
              type="button"
              id="toggle-password"
              aria-label="Press and hold to show password"
              aria-pressed="false"
              class="absolute inset-y-0 right-4 inline-flex items-center text-slate-500 transition hover:text-slate-700 focus:outline-none"
            >
              <svg id="icon-eye-ms" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="h-5 w-5" aria-hidden="true">
                <path d="M4 12c1.8-3.1 4.5-4.8 8-4.8s6.2 1.7 8 4.8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <circle cx="12" cy="14.2" r="3.2" stroke="currentColor" stroke-width="2.2" />
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-2xl bg-ink-950 px-5 py-4 text-sm font-semibold uppercase tracking-[0.08em] text-white shadow-soft transition hover:opacity-95 sm:text-base"
        >
          LOGIN
        </button>
      </form>
    </div>
  </section>
  <script>
    (function () {
      const stage = document.getElementById("login-stage");
      const grid = document.getElementById("login-grid");
      const layerBack = document.getElementById("login-layer-back");
      const layerMid = document.getElementById("login-layer-mid");
      const layerFront = document.getElementById("login-layer-front");
      const glow = document.getElementById("login-glow");
      const input = document.getElementById("login-password");
      const toggle = document.getElementById("toggle-password");
      if (!input || !toggle) return;

      if (stage && grid && layerBack && layerMid && layerFront && glow) {
        stage.addEventListener("mousemove", (event) => {
          const rect = stage.getBoundingClientRect();
          const x = (event.clientX - rect.left) / rect.width - 0.5;
          const y = (event.clientY - rect.top) / rect.height - 0.5;
          const px = Math.round((event.clientX - rect.left) / rect.width * 100);
          const py = Math.round((event.clientY - rect.top) / rect.height * 100);

          grid.style.transform = `translate(${x * 18}px, ${y * 14}px)`;
          layerBack.style.transform = `translate(${x * 30}px, ${y * 24}px) scale(1.03)`;
          layerMid.style.transform = `translate(${x * -22}px, ${y * -18}px)`;
          layerFront.style.transform = `translate(${x * 42}px, ${y * 30}px)`;
          glow.style.background = `radial-gradient(circle at ${px}% ${py}%, rgba(255,255,255,0.95), rgba(255,255,255,0.18) 28%, rgba(255,255,255,0) 58%)`;
        });

        stage.addEventListener("mouseleave", () => {
          grid.style.transform = "translate(0, 0)";
          layerBack.style.transform = "translate(0, 0) scale(1)";
          layerMid.style.transform = "translate(0, 0)";
          layerFront.style.transform = "translate(0, 0)";
          glow.style.background = "radial-gradient(circle at 50% 50%, rgba(255,255,255,0.72), rgba(255,255,255,0.12) 32%, rgba(255,255,255,0) 62%)";
        });

        glow.style.background = "radial-gradient(circle at 50% 50%, rgba(255,255,255,0.72), rgba(255,255,255,0.12) 32%, rgba(255,255,255,0) 62%)";
      }

      const showPassword = () => {
        input.type = "text";
        toggle.setAttribute("aria-pressed", "true");
      };

      const hidePassword = () => {
        input.type = "password";
        toggle.setAttribute("aria-pressed", "false");
      };

      toggle.addEventListener("mousedown", (event) => {
        event.preventDefault();
        showPassword();
      });
      toggle.addEventListener("mouseup", hidePassword);
      toggle.addEventListener("mouseleave", hidePassword);
      toggle.addEventListener("touchstart", showPassword, { passive: true });
      toggle.addEventListener("touchend", hidePassword);
      toggle.addEventListener("touchcancel", hidePassword);
      toggle.addEventListener("blur", hidePassword);
      toggle.addEventListener("keydown", (event) => {
        if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          showPassword();
        }
      });
      toggle.addEventListener("keyup", (event) => {
        if (event.key === " " || event.key === "Enter") hidePassword();
      });
    })();
  </script>
{% endblock %}
