services:
  - type: web
    name: nemos-app
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /login/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: nemos-app.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://nemos-app.onrender.com
      - key: DJANGO_SERVE_STATIC_FILES
        value: "True"
      - key: DJANGO_CACHE_BACKEND
        value: django.core.cache.backends.locmem.LocMemCache
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DJANGO_CHANNEL_LAYER_BACKEND
        value: channels.layers.InMemoryChannelLayer
